name: Release

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version-bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.44.0"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Determine version
  # ─────────────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      release-tag: ${{ steps.version.outputs.release-tag }}
      docs-only: ${{ steps.docscheck.outputs.docs-only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch origin develop --tags

      # ──────────────────────────────────────────────────────
      # R03: detect docs-only pushes FIRST so the version
      # bump is skipped when there's nothing to release. A
      # docs-only push is one where the diff vs the most
      # recent GitHub Release's tag touches only
      # DEVELOPMENT_BOARD.md / DEVELOPMENT_LOG.md (the
      # project-management artifacts the cron posts every
      # hour). Code-affecting paths under
      # apps/cloudstream_app/{lib,test,pubspec.yaml,android,
      # ios,macos} force a real release. Skipping the
      # version bump on docs-only pushes keeps the next
      # non-docs release's version number monotonic
      # (LAST_REAL_RELEASE + 1, not LAST_REAL_RELEASE + 2
      # for the first post-docs release).
      # ──────────────────────────────────────────────────────
      - name: Detect docs-only push (R03)
        id: docscheck
        run: |
          # The most recent tag that has a GitHub Release
          # page published against it. We skip stranded
          # tags like v0.1.61 that were pushed but never
          # had a release published. For a fresh repo
          # with no releases, treat the push as code.
          LATEST_RELEASE_TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)

          if [ -z "$LATEST_RELEASE_TAG" ]; then
            echo "No prior release found — treating push as code (docs-only=false)"
            echo "docs-only=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing current HEAD against $LATEST_RELEASE_TAG"

          # Files changed since the last release. Allowlist
          # the docs files; everything else is "code".
          CHANGED=$(git diff --name-only "$LATEST_RELEASE_TAG"..HEAD)

          # Code-affecting paths: anything under the
          # Flutter app's source / test / platform dirs,
          # plus pubspec.yaml and the release workflow
          # itself. DEVELOPMENT_BOARD.md and
          # DEVELOPMENT_LOG.md are NOT in this list —
          # those are the docs files we want to skip.
          CODE_CHANGED=$(echo "$CHANGED" | grep -E '^(apps/cloudstream_app/(lib|test|android|ios|macos)/|apps/cloudstream_app/pubspec\.yaml|\.github/workflows/)' || true)

          if [ -z "$CODE_CHANGED" ]; then
            echo "docs-only push — only docs files changed since $LATEST_RELEASE_TAG"
            echo "Changed files:"
            echo "$CHANGED" | sed 's/^/  /'
            echo "docs-only=true" >> $GITHUB_OUTPUT
          else
            echo "Code-affecting files changed — full release required"
            echo "Code changes:"
            echo "$CODE_CHANGED" | sed 's/^/  /'
            echo "docs-only=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version
        id: version
        # Only bump the version when there's something to
        # release. On docs-only pushes, the build + release
        # jobs are skipped via the `docs-only` output; the
        # next non-docs push should bump from the last
        # *released* version, not the (skipped) bumped one.
        if: steps.docscheck.outputs.docs-only != 'true'
        run: |
          # Find the most recent semver tag, skipping non-semver tags like "latest"
          CURRENT=$(git tag --list 'v*' --sort=-version:refname | head -1 | sed 's/^v//' 2>/dev/null || echo "0.0.0")
          BUMP=${{ github.event.inputs.version-bump || 'patch' }}

          # Parse version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          # Fallback if parsing failed
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            CURRENT="0.0.0"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          fi

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          RELEASE_TAG="v$NEW_VERSION"

          echo "Current: $CURRENT"
          echo "Bump: $BUMP"
          echo "New version: $NEW_VERSION"
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release-tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build all platforms (parallel)
  # ─────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [version]
    if: needs.version.outputs.docs-only != 'true'
    environment:
      name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: cd apps/cloudstream_app && flutter pub get

      # NOTE: Release build requires signing. Configure ios/Runner.xcworkspace
      # with a valid Apple certificate and provisioning profile in the repo,
      # or use --export-options-plist for ad-hoc / enterprise distribution.
      - name: Build iOS (release)
        run: |
          cd apps/cloudstream_app && flutter build ios --release --no-codesign 2>&1

      - name: Package iOS artifact
        run: |
          cd apps/cloudstream_app/build/ios/iphoneos
          zip -r ../Runner_iOS.zip Runner.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ needs.version.outputs.new-version }}
          path: apps/cloudstream_app/build/ios/Runner_iOS.zip
          retention-days: 30

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.docs-only != 'true'
    environment:
      name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: cd apps/cloudstream_app && flutter pub get

      # NOTE: For release APK signing, configure android/key.properties
      # with a valid keystore. For now, builds an unsigned APK.
      - name: Build APK (release)
        run: |
          cd apps/cloudstream_app && flutter build apk --release \
            --dart-define=ApiConfig.baseUrl=http://100.112.53.35:8001 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.version.outputs.new-version }}
          path: apps/cloudstream_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [version]
    if: needs.version.outputs.docs-only != 'true'
    environment:
      name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: cd apps/cloudstream_app && flutter pub get

      - name: Build macOS (release)
        run: |
          cd apps/cloudstream_app && flutter build macos --release 2>&1

      - name: Package macOS artifact
        run: |
          cd apps/cloudstream_app/build/macos/Build/Products/Release
          zip -r Runner_macOS.zip cloudstream_app.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ needs.version.outputs.new-version }}
          path: apps/cloudstream_app/build/macos/Build/Products/Release/Runner_macOS.zip
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # JOB 3: Tag + GitHub Release
  # ─────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-ios, build-android, build-macos]
    if: needs.version.outputs.docs-only != 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag + commit
        env:
          NEW_VERSION: ${{ needs.version.outputs.new-version }}
          RELEASE_TAG: ${{ needs.version.outputs.release-tag }}
        run: |
          git config --global user.email "ci@cloudstream.app"
          git config --global user.name "CloudStream CI"
          git tag -a $RELEASE_TAG -m "Release $NEW_VERSION" --force
          git push origin $RELEASE_TAG --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release-tag }}
          name: CloudStream ${{ needs.version.outputs.new-version }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/android-apk-${{ needs.version.outputs.new-version }}/app-release.apk
            artifacts/macos-release-${{ needs.version.outputs.new-version }}/Runner_macOS.zip
            artifacts/ios-release-${{ needs.version.outputs.new-version }}/Runner_iOS.zip
          body: |
            ## CloudStream ${{ needs.version.outputs.new-version }}

            See [SPEC.md](SPEC.md) for the full feature roadmap.

            ### Platform Builds
            - ✅ Android (APK) — install directly on Firestick/Android
            - ✅ macOS
            - ✅ iOS (requires Apple Developer account for sideloading)

            ### Installation
            **Android:** Download the APK → Install → Enable "Install from unknown sources" in settings.

            **macOS:** Drag Runner.app to Applications, then right-click → Open (bypass Gatekeeper on first run).

            **iOS:** Open the .app in Xcode → select your device → Run (requires signing certificate).
