name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version-bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: "3.44.0"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Determine version
  # ─────────────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      release-tag: ${{ steps.version.outputs.release-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          BUMP=${{ github.event.inputs.version-bump || 'patch' }}

          # Parse version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          RELEASE_TAG="v$NEW_VERSION"

          echo "Current: $CURRENT"
          echo "Bump: $BUMP"
          echo "New version: $NEW_VERSION"
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release-tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build all platforms (parallel)
  # ─────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [version]
    environment:
      name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: cd apps/cloudstream_app && flutter pub get

      # NOTE: Release build requires signing. Configure ios/Runner.xcworkspace
      # with a valid Apple certificate and provisioning profile in the repo,
      # or use --export-options-plist for ad-hoc / enterprise distribution.
      - name: Build iOS (release)
        run: |
          cd apps/cloudstream_app && flutter build ios --release --no-codesign 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ needs.version.outputs.new-version }}
          path: apps/cloudstream_app/build/ios/iphoneos/Runner.app
          retention-days: 30

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: cd apps/cloudstream_app && flutter pub get

      # NOTE: For release APK signing, configure android/key.properties
      # with a valid keystore. For now, builds an unsigned APK.
      - name: Build APK (release)
        run: |
          cd apps/cloudstream_app && flutter build apk --release \
            --dart-define=ApiConfig.baseUrl=http://100.112.53.35:8001 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.version.outputs.new-version }}
          path: apps/cloudstream_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [version]
    environment:
      name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: cd apps/cloudstream_app && flutter pub get

      - name: Build macOS (release)
        run: |
          cd apps/cloudstream_app && flutter build macos --release 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ needs.version.outputs.new-version }}
          path: apps/cloudstream_app/build/macos/Build/Products/Release/
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # JOB 3: Tag + GitHub Release
  # ─────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-ios, build-android, build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag + commit
        env:
          NEW_VERSION: ${{ needs.version.outputs.new-version }}
          RELEASE_TAG: ${{ needs.version.outputs.release-tag }}
        run: |
          git config --global user.email "ci@cloudstream.app"
          git config --global user.name "CloudStream CI"
          git tag -a $RELEASE_TAG -m "Release $NEW_VERSION" --force
          git push origin $RELEASE_TAG --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release-tag }}
          name: CloudStream ${{ needs.version.outputs.new-version }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/android-apk-${{ needs.version.outputs.new-version }}/app-release.apk
            artifacts/macos-release-${{ needs.version.outputs.new-version }}/*.app
            artifacts/ios-release-${{ needs.version.outputs.new-version }}/*.app
          body: |
            ## CloudStream ${{ needs.version.outputs.new-version }}

            See [SPEC.md](SPEC.md) for the full feature roadmap.

            ### Platform Builds
            - ✅ Android (APK) — install directly on Firestick/Android
            - ✅ macOS
            - ✅ iOS (requires Apple Developer account for sideloading)

            ### Installation
            **Android:** Download the APK → Install → Enable "Install from unknown sources" in settings.

            **macOS:** Drag Runner.app to Applications, then right-click → Open (bypass Gatekeeper on first run).

            **iOS:** Open the .app in Xcode → select your device → Run (requires signing certificate).
